{% extends "base.html" %}

{% block content %}

<h2>Attendance Report</h2>

<table>

<tr>

<th>Date</th>

<th>Student ID</th>

<th>Name</th>

<th>Check In</th>

<th>Check Out</th>

<th>Status</th>

</tr>

{% for row in attendance %}

<tr>

<td>{{ row.date }}</td>

<td>{{ row.student_id }}</td>

<td>{{ row.full_name }}</td>

<td>{{ row.check_in }}</td>

<td>{{ row.check_out }}</td>

<td>{{ row.status }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
